<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Günün Denemesi</title>


<style>
body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    margin:0;
    padding:15px;
    color:#fff;
}

/* Header */
.header{
    text-align:center;
    font-size:28px;
    font-weight:900;
    margin-bottom:10px;
    color:#facc15;
    text-shadow:0 0 15px rgba(250,204,21,.35);
}

/* Timer */
.timer-box{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.12);
    padding:14px;
    border-radius:16px;
    text-align:center;
    font-size:22px;
    font-weight:800;
    margin-bottom:20px;
    color:#fff;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

/* Kartlar */
.question-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:22px;
    margin-bottom:22px;
    box-shadow:0 8px 30px rgba(0,0,0,.25);
}

/* Soru */
.question-title{
    font-size:17px;
    font-weight:700;
    margin-bottom:18px;
    color:#fff;
}

/* Şık */
.option{
    border:2px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    cursor:pointer;
    transition:.25s;
}

.option:hover{
    transform:translateY(-2px);
    border-color:#facc15;
    background:rgba(250,204,21,.12);
}

.option.selected{
    background:#facc15;
    border-color:#facc15;
    color:#111827;
    font-weight:700;
}

/* Buton */
.finish-btn{
    width:100%;
    background:linear-gradient(135deg,#facc15,#eab308);
    color:#111827;
    border:none;
    padding:17px;
    font-size:17px;
    border-radius:16px;
    font-weight:900;
    cursor:pointer;
    margin-top:12px;
    box-shadow:0 8px 25px rgba(250,204,21,.25);
    transition:.25s;
}

.finish-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(250,204,21,.35);
}

/* TÜM KOPYALAMA / SEÇMEYİ KAPAT */

*{
  -webkit-user-select:none !important;
  -moz-user-select:none !important;
  -ms-user-select:none !important;
  user-select:none !important;

  -webkit-touch-callout:none !important;
  -webkit-tap-highlight-color:transparent !important;
}
</style>
</head>

<body>

<body>

<div class="header">📅 Günün Denemesi</div>
<div class="timer-box">
⏳ Kalan Süre: <span id="timer">50:00</span>
</div>
<div id="quiz"></div>

<button class="finish-btn" onclick="finish()">
Testi Bitir
</button>

<!-- Sonuç Ekranı -->
<div id="resultBox" style="display:none;">

    <div class="question-card">
        <h3>📊 Sonuçların</h3>

        <p>✅ Doğru: <span id="correct"></span></p>
        <p>❌ Yanlış: <span id="wrong"></span></p>
        <p>⚪ Boş: <span id="empty"></span></p>
        <p>🎯 Başarı: <span id="percent"></span>%</p>
    </div>
<button class="finish-btn" onclick="goCategory()">
Denemeyi Bitir
</button>

<button class="finish-btn wrong-btn"
onclick="openWrongQuestions()">
Yanlışlarını Gör
</button>


</div>






<script src="sorular.js"></script>
<script>


const today = new Date().toDateString();

if(localStorage.getItem("completedTestDate") === today){

document.body.innerHTML = `
<div style="
padding:40px;
text-align:center;
font-family:Segoe UI;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:80vh;
">

<h2 style="
color:#facc15;
font-size:28px;
margin-bottom:15px;
">
✅ Bugünkü denemenizi çözdünüz
</h2>

<p style=" font-size:18px; color:#white; margin-bottom:30px; "> Denemeler Her gün 00.00'dan Sonra Sıfırlanır. Yeni Sorular İçin Lütfen Bekleyin :) </p>

<p style="
font-size:18px;
color:#eab308;
margin-bottom:10px;
">
Yeni denemeye kalan süre: 
</p>

<div id="resetTimer"
style="
font-size:32px;
font-weight:900;
color:#white;
margin-bottom:30px;
">
00:00:00
</div>

<button onclick="window.location.href='katagoriler.html'"
style="
background:linear-gradient(135deg,#facc15,#eab308);
color:#111827;
border:none;
padding:16px 35px;
border-radius:14px;
font-size:17px;
font-weight:800;
cursor:pointer;
box-shadow:0 8px 20px rgba(250,204,21,.25);
">
Tamam
</button>

</div>
`;

function updateResetTimer(){

const now = new Date();

const midnight = new Date();

midnight.setHours(24,0,0,0);

const diff = midnight - now;

const hours =
Math.floor(diff / (1000*60*60));

const minutes =
Math.floor((diff % (1000*60*60)) / (1000*60));

const seconds =
Math.floor((diff % (1000*60))/1000);

document.getElementById("resetTimer").innerText =
`${String(hours).padStart(2,"0")}:${
String(minutes).padStart(2,"0")
}:${
String(seconds).padStart(2,"0")
}`;

}

updateResetTimer();

setInterval(updateResetTimer,1000);

throw new Error("Bugünkü test çözüldü");
}

let currentQuestions = checkTodayTest();
const questions = currentQuestions;
const quiz = document.getElementById("quiz");

questions.forEach((item,i)=>{

    let card = document.createElement("div");
    card.className = "question-card";

    let title = document.createElement("div");
    title.className = "question-title";
    title.innerText = (i+1)+". "+item.question;

    card.appendChild(title);

    if(item.image){

    let img = document.createElement("img");
    img.src = item.image;

    img.style.width = "100%";
    img.style.maxWidth = "300px";
    img.style.display = "block";
    img.style.margin = "10px auto";
    img.style.borderRadius = "10px";

    card.appendChild(img);
}

    Object.entries(item.options).forEach(([key,opt],j)=>{
value="${key}"
        let label = document.createElement("div");
        label.className = "option";

        label.innerHTML = `
  <input type="radio" name="q${i}" value="${Object.keys(item.options)[j]}">
  <span>${Object.values(item.options)[j]}</span>
`;

        label.onclick = ()=>{

            // Aynı sorudaki diğerlerini sil
            document
              .querySelectorAll(`input[name="q${i}"]`)
              .forEach(x=>{
                  x.parentElement.classList.remove("selected");
              });

            label.classList.add("selected");
            label.querySelector("input").checked = true;
        };

        card.appendChild(label);

    });

    quiz.appendChild(card);

});

function finish(){

    let correct = 0;
    let wrong = 0;
    let empty = 0;

    clearInterval(countdown);

    let wrongQuestions = [];

    currentQuestions.forEach((q,i)=>{

        let selected =
        document.querySelector(`input[name="q${i}"]:checked`);

        if(!selected){
            empty++;
            return;
        }

        let answer = selected.value;

        if(answer === q.answer){

            correct++;

        }else{

            wrong++;

            wrongQuestions.push({
                question: q.question,
                correct: q.options[q.answer],
                image: q.image || null
            });

        }

    });

    let total = currentQuestions.length;
    let percent = Math.round((correct / total) * 100);

    document.getElementById("correct").innerText = correct;
    document.getElementById("wrong").innerText = wrong;
    document.getElementById("empty").innerText = empty;
    document.getElementById("percent").innerText = percent;

    document.getElementById("quiz").style.display = "none";

    document.querySelector(".finish-btn").style.display = "none";

    document.getElementById("resultBox").style.display = "block";

    localStorage.setItem(
        "wrongQuestions",
        JSON.stringify(wrongQuestions)
    );

    saveScore(percent);

    localStorage.setItem(
        "completedTestDate",
        new Date().toDateString()
    );

}




function getDailyQuestions(){

let used =
JSON.parse(localStorage.getItem("usedQuestions")) || [];

// seçilmemişler
let available =
questionBank.filter(q => !used.includes(q.id));

// hepsi bittiyse sıfırla
if(available.length < 50){

used = [];
localStorage.setItem(
"usedQuestions",
JSON.stringify([])
);

available = [...questionBank];
}

// karıştır
for(let i=available.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[available[i],available[j]]=
[available[j],available[i]];
}

// 50 seç
let selected = available.slice(0,50);

// kaydet
used.push(...selected.map(q=>q.id));

localStorage.setItem(
"usedQuestions",
JSON.stringify(used)
);

return selected;
}


function checkTodayTest(){

const today = new Date().toDateString();

const savedDate =
localStorage.getItem("lastTestDate");

if(savedDate === today){

localStorage.setItem(
"startedTestDate",
today
);

return JSON.parse(
localStorage.getItem("todayQuestions")
);
}

const newTest = getDailyQuestions();

localStorage.setItem("lastTestDate", today);

localStorage.setItem(
"todayQuestions",
JSON.stringify(newTest)
);

localStorage.setItem(
"startedTestDate",
today
);

localStorage.removeItem("completedTestDate");

return newTest;
}

function goCategory(){

localStorage.setItem(
"completedTestDate",
new Date().toDateString()
);

window.location.href = "katagoriler.html";

}

let totalSeconds = 3000;

const timerElement =
document.getElementById("timer");

const countdown = setInterval(()=>{

let minutes =
Math.floor(totalSeconds/60);

let seconds =
totalSeconds%60;

timerElement.innerText =
`${minutes}:${
seconds<10?"0":""
}${seconds}`;

if(totalSeconds<=0){

clearInterval(countdown);

alert("Süre doldu. Deneme otomatik bitirildi.");

finish();

}

totalSeconds--;

},1000);


/* SAĞ TIK KAPAT */
document.addEventListener("contextmenu", e => e.preventDefault());

/* UZUN BASMA MENÜSÜ KAPAT */
document.addEventListener("selectstart", e => e.preventDefault());

/* KOPYALA / KES / YAPIŞTIR KISAYOLLARI KAPAT */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* MOBİL UZUN BASMA */
document.addEventListener("touchstart", function(){}, {passive:true});


function openWrongQuestions(){

    localStorage.setItem(
        "completedTestDate",
        new Date().toDateString()
    );

    localStorage.setItem(
        "testFinished",
        "true"
    );

    window.location.href =
    "gunundenemesiyanlislar.html";
}
</script>

</body>
</html>
