<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trafik Adabı Testi</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1813888095277705"
     crossorigin="anonymous"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #2563eb;
        --secondary: #1e3a8a;
        --bg1: #020617;
        --bg2: #0f172a;
        --card: #ffffff;
        --text: #0f172a;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #facc15;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        animation: bgMove 12s infinite alternate;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      /* HEADER */

      .top-bar {
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px);
        padding: 15px;
        text-align: center;
        color: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .top-bar h2 {
        font-size: 22px;
        margin-bottom: 6px;
      }

      .top-bar a {
        display: inline-block;
        margin-top: 6px;
        padding: 6px 12px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.3s;
      }

      .top-bar a:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

      /* CONTAINER */

      .quiz-container {
        max-width: 540px;
        margin: auto;
        padding: 18px;
        animation: fadeUp 0.6s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* AD */

      .ad-area {
        background: white;
        border-radius: 14px;
        padding: 16px;
        text-align: center;
        font-weight: 600;
        margin-bottom: 15px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }

      /* CARD */

      .card {
        background: white;
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: cardPop 0.4s ease;
      }

      @keyframes cardPop {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .card h2 {
        font-size: 17px;
        margin-bottom: 12px;
        text-align: center;
      }

      /* IMAGE */

      .question-img {
        width: 100%;
        border-radius: 14px;
        margin: 12px 0;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }

      /* OPTIONS */

      #options button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 500;
        background: #f1f5f9;
        cursor: pointer;
        transition: 0.25s;
      }

      #options button:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .correct {
        background: linear-gradient(135deg, #22c55e, #16a34a) !important;
        color: white;
      }

      .wrong {
        background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        color: white;
      }

      /* INFO */

      #infoBox {
        display: none;
        background: #fffbeb;
        border-left: 5px solid var(--warning);
        padding: 12px;
        border-radius: 12px;
        margin-top: 10px;
        font-size: 14px;
        animation: fadeUp 0.4s;
      }

      /* NAV */

      .nav-buttons {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .nav-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .nav-buttons button:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

                /* QUIZ TOP BAR */

.quiz-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.quiz-stats {
  display: flex;
  gap: 10px;
  background: #f1f5f9;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}

.exit-btn {
  background: #ef4444;
  color: white;
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.exit-btn:hover {
  transform: scale(1.1);
  opacity: 0.9;
}

/* EXIT MODAL */

.exit-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.exit-box {
  background: white;
  width: 85%;
  max-width: 320px;
  padding: 22px;
  border-radius: 18px;
  text-align: center;
  animation: fadeUp 0.3s ease;
}

.exit-box h3 {
  margin-bottom: 8px;
}

.exit-box p {
  font-size: 14px;
  color: #475569;
  margin-bottom: 15px;
}

.exit-actions {
  display: flex;
  gap: 10px;
}

.exit-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.btn-no {
  background: #e5e7eb;
}

.btn-yes {
  background: #ef4444;
  color: white;
}

.btn-yes:hover {
  opacity: 0.9;
}
    </style>
  </head>

  <body>

          <!-- EXIT MODAL -->

<div id="exitModal" class="exit-modal">

  <div class="exit-box">

    <h3>Testten Çıkmak İstiyor musun?</h3>

    <p>İlerlemen kaybolabilir.</p>

    <div class="exit-actions">

      <button class="btn-no" onclick="closeExit()">Vazgeç</button>

      <button class="btn-yes" onclick="exitTest()">Evet, Çık</button>

    </div>

  </div>

</div>


    <div class="quiz-container">
     

      <div class="card">
 <div class="quiz-top-bar">

  <div class="quiz-stats">
    <span id="statCorrect">✅ 0</span>
    <span id="statWrong">❌ 0</span>
    <span id="statEmpty">⚪ 10</span>
  </div>

  <button class="exit-btn" onclick="confirmExit()">✖</button>

</div>

        <h2 id="questionText"></h2>

        <img id="questionImg" class="question-img" style="display: none" />

        <div id="options"></div>

        <div id="infoBox"></div>

        <div class="nav-buttons">
          <button id="prevBtn">⬅ Geri</button>
          <button id="nextBtn">İleri ➡</button>
        </div>
      </div>
    </div>

    <script>
      let currentQuestion = 0;
      let userAnswers = Array(10).fill(null);

      const questions = [

{
    text: "Sürücülerin toplu taşıma araçlarına (otobüs, metrobüs vb.) duraktan çıkış yaparken kolaylık sağlaması hangi bilincin göstergesidir?",
    options: ["Kamu yararına ve toplu taşımaya saygı", "Bireysel çıkar", "Korku", "Bilgisizlik"],
    correct: 0,
    explanation: "İçinde onlarca yolcu taşıyan kamu araçlarına trafikte öncelik veya kolaylık sağlamak, toplumsal yaşama duyulan saygının ifadesidir."
  },
  {
    text: "Aşağıdakilerden hangisi trafikte empati yeteneği gelişmiş bir sürücünün düşünce tarzıdır?",
    options: ["'Benim işim her zaman daha acele ve önemli.'", "'O yaya yerinde benim annem veya çocuğum da olabilirdi.'", "'Kurallar sadece acemiler içindir.'", "'Yol sadece bana ait.'"],
    correct: 1,
    explanation: "Kendini karşıdaki yayanın ya da sürücünün yerine koyarak düşünmek, empatinin en yalın ve doğru tanımıdır."
  },
  {
    text: "Trafik kazası yaptıktan sonra diğer sürücüyle kavga etmek yerine 'Geçmiş olsun, cana geleceğine mala gelsin' diyebilen bir sürücü hangi erdeme sahiptir?",
    options: ["Olgunluk ve sağduyu", "Korkaklık", "Sorumsuzluk", "Uykusuzluk"],
    correct: 0,
    explanation: "Maddi hasarlı olayları büyütmeden, insan hayatının değerini ön planda tutarak sakin kalabilmek yüksek bir sağduyu göstergesidir."
  },
  {
    text: "Sinyal vermeden aniden şerit değiştiren bir sürücüye sinirlenip, onu takip ederek önünü kesmeye çalışmak hangi adaba aykırıdır?",
    options: ["Trafikte sağduyu ve öfke yönetimi", "Hızlı sürüş teknikleri", "Araç bakım kuralları", "Yakıt tasarrufu"],
    correct: 0,
    explanation: "Yapılan bir hataya başka bir hata ve tehlikeyle (ön keserek) karşılık vermek sağduyu ve öfke yönetimi ilkelerine tamamen ters düşer."
  },
  {
    text: "Trafikte 'saygı' kavramı en çok aşağıdakilerden hangisini korumayı amaçlar?",
    options: ["Sadece lüks araçları", "Toplumun huzurunu ve can güvenliğini", "Sadece trafik polislerini", "Yol kenarındaki tabelaları"],
    correct: 1,
    explanation: "Trafikteki karşılıklı saygı, kaos ortamını engelleyerek tüm sürücü ve yayaların can güvenliğini ve psikolojik huzurunu korur."
  },
  {
    text: "Trafik sıkışıklığı sırasında sürekli şerit değiştirerek (kaynak yapmaya çalışarak) diğer sürücülerin önüne geçmek neye yol açar?",
    options: ["Trafik düzeninin daha da bozulmasına ve gerginliğe", "Trafiğin hızla açılmasına", "Yakıt tasarrufuna", "Aracın motorunun soğumasına"],
    correct: 0,
    explanation: "Sıra beklemeden sürekli aralara sızmaya çalışmak hem trafiği daha çok kilitler hem de diğer sürücüleri provoke ederek gerginlik yaratır."
  },
  {
    text: "Geçiş hakkı kendisine ait olduğu halde, yoğun trafikte ana yola çıkmakta zorlanan bir araca durarak yol veren sürücü ne kazanır?",
    options: ["Trafik barışına ve huzuruna katkı sağlar", "Para ödülü kazanır", "Zaman kazanır", "Ehliyet puanı artar"],
    correct: 0,
    explanation: "Yasal bir zorunluluk olmasa bile zor durumdaki araca nezaket göstermek, trafikteki yardımlaşma ve barış ortamını besler."
  },
  {
    text: "Korna sesinin şehir hayatında yarattığı gürültü kirliliğini düşünerek, sadece çok acil tehlike anlarında korna kullanan sürücü hangi özelliğe sahiptir?",
    options: ["Çevreye ve topluma karşı duyarlılık", "Bilgisizlik", "Korkaklık", "Aracını sevmeme"],
    correct: 0,
    explanation: "Gereksiz korna çalmanın ses kirliliği yaratarak insanları strese soktuğunu bilmek ve buna göre davranmak çevre duyarlılığıdır."
  },
  {
    text: "Sürücülerin trafikte kendilerini 'Hâkim' veya 'Cezalandırıcı' yerine koyup hata yapanları sıkıştırmaya çalışması hangi adaba aykırıdır?",
    options: ["Hukuk ve saygı ilkelerine", "Hız sınırlarına", "Motor temizliğine", "Tasarruf kurallarına"],
    correct: 0,
    explanation: "Trafikte ceza verme veya had bildirme yetkisi sadece kanuni otoritelere (polise/kameralara) aittir; sürücülerin kendi adaletini aramaya çalışması suçtur."
  },
  {
    text: "Trafikte bir sürücünün hata yaptıktan sonra diğer sürücüden el kaldırarak özür dilemesi, ortamda neyi sağlar?",
    options: ["Gerginliğin anında azalmasını ve hoşgörüyü", "Kavganın büyümesini", "Aracın hızlanmasını", "Ceza puanı alınmasını"],
    correct: 0,
    explanation: "Hatasını kabul edip medeni bir şekilde özür dilemek, karşı tarafın öfkesini anında söndüren ve trafiği sakinleştiren en asil adab hareketidir."
  }

      ];

      const questionText = document.getElementById("questionText");
      const optionsDiv = document.getElementById("options");
      const infoBox = document.getElementById("infoBox");
      const questionImg = document.getElementById("questionImg");

      function loadQuestion() {
        const q = questions[currentQuestion];
        questionText.textContent = `${currentQuestion + 1}. ${q.text}`;
        optionsDiv.innerHTML = "";
        infoBox.style.display = "none";

        if (q.image) {
          questionImg.src = q.image;
          questionImg.style.display = "block";
        } else {
          questionImg.style.display = "none";
        }

        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.textContent = opt;

          if (userAnswers[currentQuestion] !== null) {
            btn.disabled = true;
            if (i === q.correct) btn.classList.add("correct");
            if (i === userAnswers[currentQuestion] && i !== q.correct)
              btn.classList.add("wrong");
          }

          btn.onclick = () => selectAnswer(i, btn);
          optionsDiv.appendChild(btn);
        });
      }

      function selectAnswer(i, btn) {
        if (userAnswers[currentQuestion] !== null) return;
        userAnswers[currentQuestion] = i;
        const q = questions[currentQuestion];

        document
          .querySelectorAll("#options button")
          .forEach((b) => (b.disabled = true));

        if (i === q.correct) {
          btn.classList.add("correct");
          setTimeout(nextQuestion, 700);
        } else {
          btn.classList.add("wrong");
          document
            .querySelectorAll("#options button")
            [q.correct].classList.add("correct");
          infoBox.textContent = q.explanation;
          infoBox.style.display = "block";
        }
        updateStats();
      }

      function nextQuestion() {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          showResult();
        }
      }
      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          loadQuestion();
        }
      }
      function showResult() {

                    // Sadece test bitince görev artır
let d = JSON.parse(localStorage.getItem("dailyTasks"));

if(d && !window.testCounted){

  d.tests++;

  localStorage.setItem("dailyTasks", JSON.stringify(d));

  window.testCounted = true; // tekrar saymasın
}



        let correct = 0;
        let wrong = 0;
        let empty = 0;

        userAnswers.forEach((answer, i) => {
          if (answer === null) {
            empty++;
          } else if (answer === questions[i].correct) {
            correct++;
          } else {
            wrong++;
          }


        });

        const total = questions.length;
        const successRate = Math.round((correct / total) * 100);

        document.querySelector(".quiz-container").innerHTML = `
    <div class="card" style="text-align:center">
      <h2>Test Sonucu</h2>

      <p>✅ Doğru: <strong>${correct}</strong></p>
      <p>❌ Yanlış: <strong>${wrong}</strong></p>
      <p>⚪ Boş: <strong>${empty}</strong></p>

      <hr>

      <p>Başarı Oranı: <strong>%${successRate}</strong></p>
<p>Tebrikler bu testi çözerek XP kazandınız! Seviyenizi hesabınızda görebilirsiniz.</p>
      <button 
        onclick="window.location.href='katagoriler.html'"
        style="
          margin-top:15px;
          padding:12px 25px;
          border:none;
          border-radius:12px;
          background:#2a5298;
          color:white;
          font-size:16px;
          cursor:pointer;
        ">
        Bitir
      </button>
    </div>
  `;
        function saveTestResult(testKey, correct, wrong, empty, success) {
              let user = JSON.parse(localStorage.getItem("user"));

              if (!user) {
                user = {
                  nickname: "Misafir",
                  xp:0,
      level:1,
      solved:0,
      tests:{}
                };
              }

              const percent = Math.round((correct / 10) * 100);
              let scorePercent = Math.round((correct / total) * 100);

              user.xp += scorePercent;
  if(!user.tests) user.tests = {};

  user.solved++;

  user.xp += successRate;
              localStorage.setItem("user", JSON.stringify(user));

              user.tests[testKey] = {
                correct,
                wrong,
                empty,
                percent: successRate
              };

              localStorage.setItem("user", JSON.stringify(user));
            }
            saveTestResult("trafikadabi-test-5", correct, wrong, empty, successRate);
          }

      function finishTest(result) {
        const user = JSON.parse(localStorage.getItem("user")) || {};
        user.tests = user.tests || {};
        user.inProgress = user.inProgress || {};

        user.tests["trafikadabi-test-5"] = result; // yeni sonuç
        delete user.inProgress["trafikadabi-test-5"]; // yarım kalma durumu silinir

        localStorage.setItem("user", JSON.stringify(user));
      }

      document.getElementById("nextBtn").onclick = nextQuestion;
      document.getElementById("prevBtn").onclick = prevQuestion;

      function updateStats() {

  let correct = 0;
  let wrong = 0;
  let empty = 0;

  userAnswers.forEach((answer, i) => {

    if (answer === null) {
      empty++;
    } 
    else if (answer === questions[i].correct) {
      correct++;
    } 
    else {
      wrong++;
    }

  });

  document.getElementById("statCorrect").textContent = "✅ " + correct;
  document.getElementById("statWrong").textContent = "❌ " + wrong;
  document.getElementById("statEmpty").textContent = "⚪ " + empty;
}

function confirmExit() {
  document.getElementById("exitModal").style.display = "flex";
}

function closeExit() {
  document.getElementById("exitModal").style.display = "none";
}

function exitTest() {
  window.location.href = "katagoriler.html";
}



          loadQuestion();
    </script>
  </body>
</html>
