<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Yanlış Sorular</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f8fafc;
color:#111827;
padding:20px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;

padding:18px;

background:linear-gradient(
135deg,
#050505,
#111,
#1c1c1c,
#facc15 220%
);

border-radius:0 0 24px 24px;
margin:-20px -20px 25px -20px;
}

.title{
font-size:22px;
font-weight:800;
color:white;
}

.title span{
color:#facc15;
}

.back-btn{
width:46px;
height:46px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.08);
color:#facc15;
font-size:18px;
cursor:pointer;
}

/* CARD */

.card{
background:white;
border-radius:22px;
padding:20px;
margin-bottom:18px;

box-shadow:
0 8px 24px rgba(0,0,0,.06);

border:1px solid #eef2f7;
}

.question{
font-size:17px;
font-weight:700;
margin-bottom:14px;
line-height:1.5;
}

.correct{
background:#ecfdf5;
color:#16a34a;
padding:12px;
border-radius:14px;
font-weight:700;
}

img{
width:100%;
max-width:300px;
display:block;
margin:14px auto;
border-radius:14px;
}

.empty{
text-align:center;
padding:60px 20px;
font-size:20px;
font-weight:700;
color:#64748b;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
<span>❌</span> Yanlış Sorular
</div>

<button class="back-btn"
onclick="history.back()">
<i class="fa-solid fa-chevron-left"></i>
</button>

</div>

<div id="list"></div>

<script>

const data =
JSON.parse(
localStorage.getItem("wrongQuestions")
) || [];

const list =
document.getElementById("list");

if(data.length === 0){

list.innerHTML = `
<div class="empty">
Tebrikler 🎉<br>
Hiç yanlışın yok.
</div>
`;

}else{

data.forEach((item,index)=>{

list.innerHTML += `

<div class="card">

<div class="question">
${index+1}. ${item.question}
</div>

${
item.image
?
`<img src="${item.image}">`
:
""
}

<div class="correct">
✔ Doğru Cevap:
${item.correct}
</div>

</div>

`;

});

}

</script>

</body>
</html>
