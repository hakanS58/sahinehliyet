<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Trafik Testleri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#050505,#111,#1a1a1a);
color:white;
min-height:100vh;
}

/* HEADER */

.app-header{
position:sticky;
top:0;
z-index:999;
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(135deg,#000,#151515,#2a2a2a);
border-bottom:1px solid rgba(255,215,0,.25);
box-shadow:0 8px 30px rgba(0,0,0,.5);
}

.app-title{
font-size:24px;
font-weight:800;
color:#facc15;
}

.back-btn{
width:46px;
height:46px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.08);
color:#facc15;
font-size:18px;
cursor:pointer;
transition:.25s;
}

.back-btn:hover{
background:#facc15;
color:black;
transform:scale(1.08);
}

/* CONTAINER */

.container{
max-width:540px;
margin:auto;
padding:18px;
}

/* HEADER BOX */

.header{
background:linear-gradient(135deg,#111,#1a1a1a);
padding:22px;
border-radius:24px;
border:1px solid rgba(250,204,21,.15);
box-shadow:0 10px 30px rgba(0,0,0,.45);
margin-bottom:18px;
}

.header h2{
text-align:center;
color:#facc15;
margin-bottom:12px;
}

.header p{
text-align:center;
color:#d1d5db;
line-height:1.7;
font-size:14px;
}

/* TESTLER */

.test-list{
display:flex;
flex-direction:column;
gap:15px;
}

.test-btn{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
border-radius:20px;
text-decoration:none;
font-weight:700;
font-size:17px;
color:white;
background:linear-gradient(135deg,#121212,#222,#333);
border:1px solid rgba(250,204,21,.12);
box-shadow:0 8px 25px rgba(0,0,0,.35);
transition:.35s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.test-btn::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(135deg,transparent,rgba(250,204,21,.15));
opacity:0;
transition:.3s;
}

.test-btn:hover::before{
opacity:1;
}

.test-btn:hover{
transform:translateY(-5px);
box-shadow:0 18px 35px rgba(250,204,21,.18);
}

.test-btn i{
color:#facc15;
font-size:20px;
}

/* PREMIUM BADGE */

.badge{
background:#facc15;
color:black;
font-size:12px;
font-weight:700;
padding:5px 12px;
border-radius:30px;
}

/* COMPLETED */

.completed{
border:2px solid #22c55e;
}

/* LOCK SCREEN */

.lock-screen{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
}

.lock-box{
background:#111;
padding:30px;
border-radius:24px;
text-align:center;
max-width:350px;
border:1px solid rgba(250,204,21,.2);
}

.lock-box h2{
color:#facc15;
margin-bottom:10px;
}

.lock-box p{
color:#ddd;
margin-bottom:18px;
}

.lock-btn{
background:#facc15;
color:black;
padding:14px 28px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
}
</style>
</head>
<body>

<header class="app-header">
<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-chevron-left"></i>
</button>

<div class="app-title">👑 Premium</div>
</header>

<div class="container">

<div class="header">
<h2>👑 Premium Trafik Testleri</h2>
<p>
Sadece premium üyeler için hazırlanmış gelişmiş trafik testleri.
</p>
</div>

<div class="test-list">

<a class="test-btn" href="premiumtrafiktest1.html" id="premium-test-1">
Premium Test 1
<i class="fa-solid fa-crown"></i>
</a>

<a class="test-btn" href="premiumtrafiktest2.html" id="premium-test-2">
Premium Test 2
<i class="fa-solid fa-crown"></i>
</a>

<a class="test-btn" href="premiumtrafiktest3.html" id="premium-test-3">
Premium Test 3
<i class="fa-solid fa-crown"></i>
</a>

<a class="test-btn" href="premiumtrafiktest4.html" id="premium-test-4">
Premium Test 4
<i class="fa-solid fa-crown"></i>
</a>

<a class="test-btn" href="premiumtrafiktest5.html" id="premium-test-5">
Premium Test 5
<i class="fa-solid fa-crown"></i>
</a>

</div>
</div>



<script>





/* PREMIUM SAYFASI */

function goPremium(){
location.href="premium.html";
}

/* ÇÖZÜLDÜ */

let user = JSON.parse(localStorage.getItem("user")) || {tests:{}};

Object.keys(user.tests || {}).forEach(id=>{
let btn=document.getElementById(id);
if(btn) btn.classList.add("completed");
});

</script>

</body>
</html>
