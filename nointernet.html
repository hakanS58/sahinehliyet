<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İnternet Yok</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#111,#1a1a1a);
overflow:hidden;
color:white;
}

/* Kart */

.box{
width:92%;
max-width:390px;
padding:35px 28px;
border-radius:28px;
text-align:center;

background:linear-gradient(
135deg,
rgba(255,255,255,.04),
rgba(255,255,255,.02)
);

backdrop-filter:blur(16px);

border:1px solid rgba(250,204,21,.18);

box-shadow:
0 20px 60px rgba(0,0,0,.45),
0 0 35px rgba(250,204,21,.08);

animation:pop .5s ease;
}

@keyframes pop{
from{
opacity:0;
transform:scale(.92);
}
to{
opacity:1;
transform:scale(1);
}
}

/* icon */

.icon-wrap{
position:relative;
width:95px;
height:95px;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:22px;
}

.icon-wrap::before{
content:'';
position:absolute;
inset:0;
border:4px solid rgba(255,255,255,.08);
border-top:4px solid #facc15;
border-radius:50%;
animation:spin 2.2s linear infinite;
}

.icon{
font-size:42px;
z-index:2;
color:#facc15;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* text */

h1{
font-size:24px;
font-weight:800;
color:#facc15;
margin-bottom:10px;
}

p{
font-size:14px;
line-height:1.7;
color:#d1d5db;
margin-bottom:22px;
}

/* button */

button{
width:100%;
padding:15px;
border:none;
border-radius:18px;

background:#facc15;
color:black;

font-size:15px;
font-weight:700;
cursor:pointer;

transition:.25s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(250,204,21,.25);
}

/* durum */

.status{
margin-top:16px;
font-size:13px;
color:#999;
}
</style>
</head>
<body>

<div class="box">

<div class="icon-wrap">
<div class="icon">📶</div>
</div>

<h1>İnternet Bağlantısı Yok</h1>

<p>
Devam edebilmek için internet bağlantını kontrol et.  
Bağlantı geri geldiğinde uygulama otomatik açılacaktır.
</p>

<button onclick="location.reload()">
Tekrar Dene
</button>

<div class="status" id="status">
Bağlantı bekleniyor...
</div>

</div>

<script>

/* internet geri gelirse otomatik ana sayfa */

window.addEventListener("online",()=>{
location.href="index.html";
});

/* canlı durum */

setInterval(()=>{

const status=document.getElementById("status");

if(navigator.onLine){
status.innerText="Bağlantı bulundu, yönlendiriliyor...";
location.href="index.html";
}else{
status.innerText="Bağlantı bekleniyor...";
}

},2000);

</script>

</body>
</html>
