}

body.dark{

}

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,system-ui;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  transition: .3s;
padding-top: 20px;
  padding-top: env(safe-area-inset-top);


}

/* ===== HEADER ===== */

.app-header{
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;

padding:16px 18px;

display:flex;
align-items:center;
justify-content:space-between;

border-radius:0 0 25px 25px;
box-shadow:var(--shadow);
}

.app-title{
font-size:18px;
font-weight:600;
}

.back-btn{
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
}

/* ===== CONTAINER ===== */

.container{
padding:18px;
max-width:720px;
margin:auto;
}

/* ===== INFO BOX ===== */

.info-box{
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
padding:16px;
border-radius:20px;
text-align:center;
font-weight:600;
margin-bottom:18px;
box-shadow:0 6px 18px rgba(37,99,235,.4);

animation:float 3s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

/* ===== NEWS CARD ===== */

.news-card{
background:var(--card);
border-radius:20px;
padding:16px;
margin-bottom:16px;

box-shadow:var(--shadow);

cursor:pointer;

transition:.3s;

animation:fadeUp .5s;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:none}
}

.news-card:hover{
transform:scale(1.02);
}

.news-title{
font-size:16px;
font-weight:600;
margin-bottom:6px;
}

.news-date{
font-size:12px;
opacity:.6;
margin-bottom:6px;
}

.news-desc{
font-size:13px;
line-height:1.5;
opacity:.9;
}

/* ===== MODAL ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);

display:none;
justify-content:center;
align-items:center;

z-index:999;
}

.modal.active{
display:flex;
}

.modal-box{
background:var(--card);
padding:22px;
border-radius:22px;
width:90%;
max-width:360px;

animation:pop .3s;
}

@keyframes pop{
from{transform:scale(.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.modal-box h3{
margin-bottom:8px;
}

.modal-box p{

  content:`Bazı adaylar ciddi hata yapmadıkları halde başarısız sayıldıklarını iddia ediyor.

const listBox = document.getElementById("newsList");
const modal = document.getElementById("newsModal");

function renderNews(){

  listBox.innerHTML = "";

  newsData.forEach(item=>{

    const div = document.createElement("div");

    div.className = "news-card";

    div.innerHTML = `
      <img src="${item.image}">
      <h3>${item.title}</h3>
      <p>${item.summary}</p>

      <button class="read-btn"
        onclick="openNews(${item.id})">
        📖 Devamını Oku
      </button>
    `;

    listBox.appendChild(div);

  });

}


function openNews(id){

  const data = newsData.find(n=>n.id===id);

  document.getElementById("mTitle").textContent = data.title;
  document.getElementById("mDate").textContent = data.date;
  document.getElementById("mText").textContent = data.content;

  document.getElementById("newsModal")
    .classList.add("active");
}

function closeModal(){

  document.getElementById("newsModal")
    .classList.remove("active");
}
renderNews();

// Modal kutusu dışında tıklayınca kapanma
modal.addEventListener("click", function(e){
  if(e.target === modal){
    closeModal();
  }
});
function closeModal(){
  modal.classList.remove("active");
}
