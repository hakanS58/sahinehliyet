<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Şahin Ehliyet</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,Segoe UI,sans-serif;
}

/* BODY */
body{
  height:100vh;
  background:linear-gradient(180deg,#020617,#020617);
  color:white;
  overflow:hidden;
}

/* ROAD */
.road{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:130px;
  height:100%;
  background:#111827;
  box-shadow:inset 0 0 0 3px #1f2933;
  z-index:1;
}

.road::before{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:6px;
  height:100%;
  background:repeating-linear-gradient(
    to bottom,
    #fff 0 25px,
    transparent 25px 45px
  );
  animation:roadMove 1.5s linear infinite;
}

@keyframes roadMove{
  from{background-position:0 0}
  to{background-position:0 100px}
}

/* MOTIVATION FLOW */
.flow{
  position:absolute;
  top:0;
  bottom:0;
  width:100px;
  overflow:hidden;
  z-index:1;
}

.flow.left{ left:10px; }
.flow.right{ right:10px; }

.flow span{
  position:absolute;
  width:100%;
  text-align:center;

  font-size:13px;
  font-weight:600;
  opacity:.35;

  animation:flowMove 12s linear infinite;
}

@keyframes flowMove{
  from{ top:100% }
  to{ top:-200px }
}

/* MAIN */
.main{
  position:relative;
  z-index:5;

  height:100%;
  padding:20px;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* GLASS PANEL */
.panel{
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(12px);

  border-radius:24px;
  padding:35px 28px;

  max-width:340px;
  width:100%;

  text-align:center;

  box-shadow:0 20px 50px rgba(0,0,0,.6);

  animation:fade 1.2s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(40px)}
  to{opacity:1; transform:translateY(0)}
}

/* LOGO */
.logo{
  font-size:38px;
  font-weight:800;
  letter-spacing:2px;
  margin-bottom:12px;
}

.logo span{
  color:#22c55e;
}

/* TEXT */
.tagline{
  font-size:14px;
  line-height:1.6;
  opacity:.9;
  margin-bottom:28px;
}

/* BUTTON */
.start-btn{
  text-decoration:none;

  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;

  padding:14px 45px;
  border-radius:40px;

  font-size:16px;
  font-weight:600;

  display:inline-block;

  box-shadow:0 10px 30px rgba(34,197,94,.5);

  transition:.3s;
}

.start-btn:hover{
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:500px){

  .panel{
    padding:28px 22px;
  }

  .logo{
    font-size:34px;
  }

}




/* ===== FEATURES ===== */

.features{
  display:flex;
  flex-direction:column;   /* ALT ALTA */
  gap:10px;
  margin-bottom:18px;
  font-size:14px;
  align-items:center;      /* ORTALA */
}

.features div{
  background:rgba(255,255,255,0.18);
  padding:8px 20px;
  border-radius:25px;
  backdrop-filter: blur(8px);
  min-width:220px;
  text-align:center;
}

.user-count{
  font-size:14px;
  font-weight:600;
  color:#d2ff0a;
  margin-bottom:25px;
  letter-spacing:.5px;

  background:rgba(0,234,255,0.12);
  padding:6px 18px;
  border-radius:20px;

  display:inline-block;
}

/* TÜM KOPYALAMA / SEÇMEYİ KAPAT */

*{
  -webkit-user-select:none !important;
  -moz-user-select:none !important;
  -ms-user-select:none !important;
  user-select:none !important;

  -webkit-touch-callout:none !important;
  -webkit-tap-highlight-color:transparent !important;
}


body{
animation:pageIn .35s ease;
}

@keyframes pageIn{
from{
opacity:0;
transform:translateX(18px);
}
to{
opacity:1;
transform:none;
}
}

button,a,.start-btn{
transition:.15s ease;
}

button:active,
a:active,
.start-btn:active{
transform:scale(.96);
opacity:.85;
}

0 14px 35px rgba(34,197,94,.35);

transition:.3s;

overflow:hidden;
}

.start-btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.28),
transparent
);

transition:.8s;
}

.start-btn:hover::before{

}

.start-btn:hover{
transform:translateY(-4px) scale(1.03);
}
.bg-glow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
height:500px;

background:radial-gradient(
circle,
rgba(34,197,94,.08),
transparent 70%
);

filter:blur(60px);
z-index:0;

animation:pulseGlow 5s ease-in-out infinite;
}

@keyframes pulseGlow{
0%,100%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.15)}
}

<body>
<div class="bg-glow"></div>
<!-- MOTIVATION FLOWS -->
<div class="flow left" id="leftFlow"></div>
<div class="flow right" id="rightFlow"></div>

<!-- ROAD -->
<div class="road"></div>

<!-- MAIN -->
<div class="main">

  <div class="panel">

    <div class="logo">
       Şahin <span>Ehliyet</span>
    </div>

    <div class="tagline">

     Güncel müfredata uygun içeriklerle<br>
ehliyet sınavına eksiksiz hazırlan.


    </div>

    <!-- Özellikler -->
<div class="features">

<div><i class="fa-solid fa-book-open"></i> Güncel Konular</div>

<div><i class="fa-solid fa-file-pen"></i> Deneme Sınavları</div>

<div><i class="fa-solid fa-chart-line"></i> Başarı Takibi</div>

</div>

<!-- Kullanıcı Sayısı -->
<div class="user-count">
<i class="fa-solid fa-users"></i>
<span>25.000+ Öğrenci Bizimle</span>
</div>


    <a href="katagoriler.html" onclick="openKategori(event)" class="start-btn">
   Hemen Başla
   <span class="btn-icon">→</span>
</a>

  </div>

</div>


<script>

/* MOTIVATION TEXTS */

const texts = [

  "🚦 Kurallara Uyan Kazanır",
  "🏁 Hedefine Az Kaldı",
  "💪 Vazgeçmek Yok",
  "📘 Her Gün Bir Adım",
  "🚗 Güvenli Sürüş",
  "🎯 Başarı Yakın",
  "🌟 Disiplin = Ehliyet",
  "🔥 Devam Et",
  "🏆 Sen Başaracaksın"

];

function createFlow(container){

  setInterval(()=>{

    const span = document.createElement("span");

    span.textContent =
      texts[Math.floor(Math.random()*texts.length)];

    span.style.left = "0";
    span.style.top = "100%";

    span.style.animationDuration =
      (8 + Math.random()*6) + "s";

    container.appendChild(span);

    setTimeout(()=>{
      span.remove();
    },15000);

  },2000);

}

createFlow(document.getElementById("leftFlow"));
createFlow(document.getElementById("rightFlow"));

/* SAĞ TIK KAPAT */
document.addEventListener("contextmenu", e => e.preventDefault());

/* UZUN BASMA MENÜSÜ KAPAT */
document.addEventListener("selectstart", e => e.preventDefault());

/* KOPYALA / KES / YAPIŞTIR KISAYOLLARI KAPAT */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* MOBİL UZUN BASMA */
document.addEventListener("touchstart", function(){}, {passive:true});


function openKategori(e){
   e.preventDefault();

   sessionStorage.setItem("fromIndex","1");

   location.href="katagoriler.html";
}
</script>
