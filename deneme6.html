        <style>
          :root {
            --primary: #2563eb;
            --secondary: #1e3a8a;
            --bg1: #020617;
            --bg2: #0f172a;
            --card: #ffffff;
            --text: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #facc15;
          }

          * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
          }

          body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            background: linear-gradient(
              135deg,
              var(--secondary),
              var(--primary)
            );
            animation: bgMove 12s infinite alternate;
          }

          @keyframes bgMove {
            0% {
              background-position: 0% 50%;
            }
            100% {
              background-position: 100% 50%;
            }
          }

          /* HEADER */

          .top-bar {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
          }

          .top-bar h2 {
            font-size: 22px;
            margin-bottom: 6px;
          }

          .top-bar a {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
          }

          .top-bar a:hover {
            transform: scale(1.05);
            opacity: 0.9;
          }

          /* CONTAINER */

          .quiz-container {
            max-width: 540px;
            margin: auto;
            padding: 18px;
            animation: fadeUp 0.6s ease;
          }

          @keyframes fadeUp {
            from {
              opacity: 0;
              transform: translateY(30px);
            }
            to {
              opacity: 1;
              transform: translateY(0);
            }
          }

          /* AD */

          .ad-area {
            background: white;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
          }

          /* CARD */

          .card {
            background: white;
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: cardPop 0.4s ease;
          }

          @keyframes cardPop {
            from {
              transform: scale(0.9);
              opacity: 0;
            }
            to {
              transform: scale(1);
              opacity: 1;
            }
          }

          .card h2 {
            font-size: 17px;
            margin-bottom: 12px;
            text-align: center;
          }

          /* IMAGE */

          .question-img {
            width: 100%;
            border-radius: 14px;
            margin: 12px 0;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
          }

          /* OPTIONS */

          #options button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            background: #f1f5f9;
            cursor: pointer;
            transition: 0.25s;
          }

          #options button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
          }

          .correct {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            color: white;
          }

          .wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            color: white;
          }

          /* INFO */

          #infoBox {
            display: none;
            background: #fffbeb;
            border-left: 5px solid var(--warning);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 14px;
            animation: fadeUp 0.4s;
          }

          /* NAV */

          .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 18px;
          }

          .nav-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(
              135deg,
              var(--secondary),
              var(--primary)
            );
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
          }

          .nav-buttons button:hover {
            transform: scale(1.05);
            opacity: 0.9;
          }




          /* QUIZ TOP BAR */

.quiz-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.quiz-stats {
  display: flex;
  gap: 10px;
  background: #f1f5f9;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}

.exit-btn {
  background: #ef4444;
  color: white;
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.exit-btn:hover {
  transform: scale(1.1);
  opacity: 0.9;
}

/* EXIT MODAL */

.exit-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.exit-box {
  background: white;
  width: 85%;
  max-width: 320px;
  padding: 22px;
  border-radius: 18px;
  text-align: center;
  animation: fadeUp 0.3s ease;
}

.exit-box h3 {
  margin-bottom: 8px;
}

.exit-box p {
  font-size: 14px;
  color: #475569;
  margin-bottom: 15px;
}

.exit-actions {
  display: flex;
  gap: 10px;
}

.exit-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.btn-no {
  background: #e5e7eb;
}

.btn-yes {
  background: #ef4444;
  color: white;
}

.btn-yes:hover {
  opacity: 0.9;
}


.option-img {
  width: 90px;
  max-width: 100%;
  border-radius: 8px;
  transition: 0.3s;
}

.option-img:hover {
  transform: scale(1.05);
}



        </style>

        <script>

            // TIMER

let time = 45 * 60;

const timerEl = document.getElementById("timer");

const timerInterval = setInterval(() => {

  let m = Math.floor(time / 60);
  let s = time % 60;

  timerEl.textContent =
    m + ":" + (s < 10 ? "0" + s : s);

  time--;

  if (time < 0) {
    clearInterval(timerInterval);

    document.getElementById("timeModal")
    .style.display = "flex";
  }

}, 1000);

                  btn.classList.add("wrong");

              btn.onclick = () => selectAnswer(i, btn);

function updateStats() {

  let correct = 0;
  let wrong = 0;
  let empty = 0;

  userAnswers.forEach((answer, i) => {

    if (answer === null) {
      empty++;
    } 
    else if (answer === questions[i].correct) {
      correct++;
    } 
    else {
      wrong++;
    }

  });

  document.getElementById("statCorrect").textContent = "✅ " + correct;
  document.getElementById("statWrong").textContent = "❌ " + wrong;
  document.getElementById("statEmpty").textContent = "⚪ " + empty;
}
