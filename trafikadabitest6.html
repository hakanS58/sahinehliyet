<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trafik Adabı Testi</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1813888095277705"
     crossorigin="anonymous"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #2563eb;
        --secondary: #1e3a8a;
        --bg1: #020617;
        --bg2: #0f172a;
        --card: #ffffff;
        --text: #0f172a;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #facc15;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        animation: bgMove 12s infinite alternate;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      /* HEADER */

      .top-bar {
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px);
        padding: 15px;
        text-align: center;
        color: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      .top-bar h2 {
        font-size: 22px;
        margin-bottom: 6px;
      }

      .top-bar a {
        display: inline-block;
        margin-top: 6px;
        padding: 6px 12px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.3s;
      }

      .top-bar a:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

      /* CONTAINER */

      .quiz-container {
        max-width: 540px;
        margin: auto;
        padding: 18px;
        animation: fadeUp 0.6s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* AD */

      .ad-area {
        background: white;
        border-radius: 14px;
        padding: 16px;
        text-align: center;
        font-weight: 600;
        margin-bottom: 15px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }

      /* CARD */

      .card {
        background: white;
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: cardPop 0.4s ease;
      }

      @keyframes cardPop {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .card h2 {
        font-size: 17px;
        margin-bottom: 12px;
        text-align: center;
      }

      /* IMAGE */

      .question-img {
        width: 100%;
        border-radius: 14px;
        margin: 12px 0;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }

      /* OPTIONS */

      #options button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 500;
        background: #f1f5f9;
        cursor: pointer;
        transition: 0.25s;
      }

      #options button:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .correct {
        background: linear-gradient(135deg, #22c55e, #16a34a) !important;
        color: white;
      }

      .wrong {
        background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        color: white;
      }

      /* INFO */

      #infoBox {
        display: none;
        background: #fffbeb;
        border-left: 5px solid var(--warning);
        padding: 12px;
        border-radius: 12px;
        margin-top: 10px;
        font-size: 14px;
        animation: fadeUp 0.4s;
      }

      /* NAV */

      .nav-buttons {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .nav-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .nav-buttons button:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

                /* QUIZ TOP BAR */

.quiz-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.quiz-stats {
  display: flex;
  gap: 10px;
  background: #f1f5f9;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}

.exit-btn {
  background: #ef4444;
  color: white;
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.exit-btn:hover {
  transform: scale(1.1);
  opacity: 0.9;
}

/* EXIT MODAL */

.exit-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.exit-box {
  background: white;
  width: 85%;
  max-width: 320px;
  padding: 22px;
  border-radius: 18px;
  text-align: center;
  animation: fadeUp 0.3s ease;
}

.exit-box h3 {
  margin-bottom: 8px;
}

.exit-box p {
  font-size: 14px;
  color: #475569;
  margin-bottom: 15px;
}

.exit-actions {
  display: flex;
  gap: 10px;
}

.exit-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.btn-no {
  background: #e5e7eb;
}

.btn-yes {
  background: #ef4444;
  color: white;
}

.btn-yes:hover {
  opacity: 0.9;
}
    </style>
  </head>

  <body>

          <!-- EXIT MODAL -->

<div id="exitModal" class="exit-modal">

  <div class="exit-box">

    <h3>Testten Çıkmak İstiyor musun?</h3>

    <p>İlerlemen kaybolabilir.</p>

    <div class="exit-actions">

      <button class="btn-no" onclick="closeExit()">Vazgeç</button>

      <button class="btn-yes" onclick="exitTest()">Evet, Çık</button>

    </div>

  </div>

</div>


    <div class="quiz-container">
     

      <div class="card">
 <div class="quiz-top-bar">

  <div class="quiz-stats">
    <span id="statCorrect">✅ 0</span>
    <span id="statWrong">❌ 0</span>
    <span id="statEmpty">⚪ 10</span>
  </div>

  <button class="exit-btn" onclick="confirmExit()">✖</button>

</div>

        <h2 id="questionText"></h2>

        <img id="questionImg" class="question-img" style="display: none" />

        <div id="options"></div>

        <div id="infoBox"></div>

        <div class="nav-buttons">
          <button id="prevBtn">⬅ Geri</button>
          <button id="nextBtn">İleri ➡</button>
        </div>
      </div>
    </div>

    <script>
      let currentQuestion = 0;
      let userAnswers = Array(10).fill(null);

      const questions = [

{
    text: "Trafik içinde sürücülerin sergilediği hangi davranış, doğrudan 'trafik adabı' kapsamında değerlendirilen yazısız yasal/ahlaki sorumluluklardan biridir?",
    options: ["Hız sınırını gösteren levhalara uymak", "Kırmızı ışık yandığında aracı durdurmak", "Arıza yapan bir aracın sürücüsüne yardım etmek veya yol vermek", "Emniyet kemerini cezadan kaçınmak için takmak"],
    correct: 2,
    explanation: "Levhalara ve ışıklara uymak yazılı hukuki kurallardır. Ancak arıza yapan veya zor durumda olan bir sürücüye yardımcı olmak ya da ona trafikte kolaylık sağlamak tamamen yazısız kuralları içeren 'trafik adabı' ile ilgilidir."
  },
  {
    text: "Yağmurlu ve çamurlu bir günde araç kullanan bir sürücünün, yol kenarındaki su birikintilerini fark etmesine rağmen hızını azaltmayarak yayaların üzerine su sıçratması, trafik adabındaki hangi temel değerin eksikliğini gösterir?",
    options: ["Bencillik", "Empati ve başkalarına saygı", "Sorumluluk bilinci", "İnatlaşma"],
    correct: 1,
    explanation: "Kendini yol kenarındaki yayanın yerine koyarak (empati yaparak) onun mağdur olacağını düşünmek ve hızı azaltmak trafik adabının temelidir. Suyu sıçratmak empati ve saygı eksikliğidir."
  },
  {
    text: "Öndeki aracın sürücüsü acemi olduğu veya aracı stop ettirdiği için ona sürekli korna çalan, selektör yapan ve el kol hareketleriyle baskı kuran bir sürücü, trafikte aşağıdaki olumsuz davranışlardan hangisini sergilemektedir?",
    options: ["Hoşgörüsüzlük ve tahammülsüzlük", "Trafik güvenliğini artırma çabası", "Hukuki hakkını arama", "Dikkati toplama"],
    correct: 0,
    explanation: "Hata yapan veya yavaş hareket eden sürücülere karşı sabır göstermemek, korna ve selektörle stres yüklemek hoşgörüsüzlük ve tahammülsüzlük örneğidir; bu durum kazalara davetiye çıkarır."
  },
  {
    text: "Trafikte engelli bir sürücü için ayrılmış park alanına, engeli olmadığı halde 'Sadece iki dakika durup çıkacağım' diyerek aracını park eden bir sürücünün bu davranışı, aşağıdakilerden hangisinin ihlalidir?",
    options: ["Sadece belediye kanunlarının", "Kul hakkı ve diğer bireylerin yasal haklarının", "Araç teknik kurallarının", "Ekonomi ilkelerinin"],
    correct: 1,
    explanation: "Engelli park yerleri, fiziksel olarak dezavantajlı vatandaşların haklarıdır. Burayı kısa süreliğine de olsa işgal etmek doğrudan kul hakkı ve toplumsal hakların ihlalidir."
  },
  {
    text: "Sürücünün direksiyon başındayken kendisini sakinleştirememesi, en ufak bir gecikmede veya şerit değiştirmede diğer sürücülerle münakaşaya girmesi durumu, trafik adabında hangi psikolojik kavramla açıklanır?",
    options: ["Öfke yönetimi eksikliği", "Gelişmiş refleks kapasitesi", "Savunma mekanizması", "Bireysel özgüven"],
    correct: 0,
    explanation: "Trafikte yaşanan aksaklıkları kişisel bir saldırı gibi algılayıp ani parlama ve kavga eğilimi göstermek, kişinin öfke yönetimi ve duygu kontrolü konusunda eksik olduğunu gösterir."
  },
  {
    text: "Trafik sıkışıklığı sırasında emniyet şeridini usulsüzce işgal ederek ilerleyen bir sürücü, bu şeridi gerçekten kullanması gereken ambulans veya itfaiyenin geçişini engelleyerek kimlerin hayatını riske atmış olur?",
    options: ["Sadece kendi hayatını", "Ambulanstaki veya acil durum bölgesindeki yardıma muhtaç kişilerin hayatını", "Hiç kimseyi, çünkü şerit boştur", "Sadece arkasından gelen araç sürücülerini"],
    correct: 1,
    explanation: "Emniyet şeritleri acil durum araçları içindir. Burayı keyfi olarak kapatan sürücüler, o esnada hastaneye yetişmeye çalışan bir hastanın ya da yangına giden itfaiyenin hakkını gasp ederek can kaybına yol açabilir."
  },
  {
    text: "Bir sürücünün, geçiş önceliği hakkına sahip olmadığı halde (örneğin tali yoldayken), ana yoldaki araca selektör yaparak yolunu kesmesi ve geçmeye çalışması, trafik adabındaki hangi olumsuz tutuma örnektir?",
    options: ["Hak ihlali ve nezaketsizlik", "Zamanı verimli kullanma", "Usta şoförlük", "Pratik zeka"],
    correct: 0,
    explanation: "Kuralın kendisine vermediği bir hakkı, zorbalıkla, korna veya selektör baskısıyla almaya çalışmak açık bir hak ihlali, bencillik ve nezaketsizliktir."
  },
  {
    text: "Aşağıdakilerden hangisi, trafik ortamında sürücülerin sergilemesi gereken ve trafiğin stresini doğrudan azaltan olumlu bir trafik adabı davranışıdır?",
    options: ["Hatalı şerit değiştiren araca yaklaşarak alan daraltmak", "Dönüş yapmak için bekleyen araca güleryüzle veya elle işaret ederek yol vermek", "Hızlı giden araçların arkasına takılarak onları takip etmek", "Sürekli olarak yüksek sesle müzik dinlemek"],
    correct: 1,
    explanation: "Trafikte diğer sürücülere karşı yapıcı, nazik ve kolaylaştırıcı davranmak (yol vermek, selamlaşmak) ortamdaki gerginliği düşürür ve güvenliği artırır."
  },
  {
    text: "Trafikte 'nezaket ve saygı' değerlerine sahip bir sürücü, şerit değiştirmek zorunda kaldığında öncelikle aşağıdakilerden hangisini yapar?",
    options: ["Sinyal vermeden aniden diğer şeride kırar", "Geçeceği şeritteki aracın sürücüsünü zor durumda bırakmayacak mesafeyi bekler ve sinyalini kullanır", "Arkadaki araca korna çalarak yavaşlamasını ister", "Hızını en alt seviyeye indirerek trafiği durdurur"],
    correct: 1,
    explanation: "Nazik ve saygılı bir sürücü, kendi manevrasını yaparken diğer yol kullanıcılarının güvenliğini tehlikeye atmayacak ve onları ani fren yapmaya zorlamayacak doğru anı bekler."
  },
  {
    text: "Trafik adabı açısından 'sorumluluk' bilincine sahip bir sürücü, aracından dışarıya çöp, sigorta izmariti veya pet şişe atılmaması gerektiğini bilir. Bu bilincin temel amacı aşağıdakilerden hangisidir?",
    options: ["Aracın hafiflemesini sağlamak", "Çevre kirliliğini, yangın riskini önlemek ve arkadaki sürücülerin görüşünü/güvenliğini korumak", "Yol kenarındaki hayvanları beslemek", "Araç içi temizlik süresini kısaltmak"],
    correct: 1,
    explanation: "Araçtan dışarı atılan maddeler çevre kirliliğinin ötesinde; arkadaki aracın camına gelerek kazaya sebep olabilir veya kuru otları tutuşturarak orman yangınlarına yol açabilir. Bunu önlemek tam bir sorumluluk bilincidir."
  }


      ];

      const questionText = document.getElementById("questionText");
      const optionsDiv = document.getElementById("options");
      const infoBox = document.getElementById("infoBox");
      const questionImg = document.getElementById("questionImg");

      function loadQuestion() {
        const q = questions[currentQuestion];
        questionText.textContent = `${currentQuestion + 1}. ${q.text}`;
        optionsDiv.innerHTML = "";
        infoBox.style.display = "none";

        if (q.image) {
          questionImg.src = q.image;
          questionImg.style.display = "block";
        } else {
          questionImg.style.display = "none";
        }

        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.textContent = opt;

          if (userAnswers[currentQuestion] !== null) {
            btn.disabled = true;
            if (i === q.correct) btn.classList.add("correct");
            if (i === userAnswers[currentQuestion] && i !== q.correct)
              btn.classList.add("wrong");
          }

          btn.onclick = () => selectAnswer(i, btn);
          optionsDiv.appendChild(btn);
        });
      }

      function selectAnswer(i, btn) {
        if (userAnswers[currentQuestion] !== null) return;
        userAnswers[currentQuestion] = i;
        const q = questions[currentQuestion];

        document
          .querySelectorAll("#options button")
          .forEach((b) => (b.disabled = true));

        if (i === q.correct) {
          btn.classList.add("correct");
          setTimeout(nextQuestion, 700);
        } else {
          btn.classList.add("wrong");
          document
            .querySelectorAll("#options button")
            [q.correct].classList.add("correct");
          infoBox.textContent = q.explanation;
          infoBox.style.display = "block";
        }
        updateStats();
      }

      function nextQuestion() {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          showResult();
        }
      }
      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          loadQuestion();
        }
      }
      function showResult() {

                    // Sadece test bitince görev artır
let d = JSON.parse(localStorage.getItem("dailyTasks"));

if(d && !window.testCounted){

  d.tests++;

  localStorage.setItem("dailyTasks", JSON.stringify(d));

  window.testCounted = true; // tekrar saymasın
}



        let correct = 0;
        let wrong = 0;
        let empty = 0;

        userAnswers.forEach((answer, i) => {
          if (answer === null) {
            empty++;
          } else if (answer === questions[i].correct) {
            correct++;
          } else {
            wrong++;
          }


        });

        const total = questions.length;
        const successRate = Math.round((correct / total) * 100);

        document.querySelector(".quiz-container").innerHTML = `
    <div class="card" style="text-align:center">
      <h2>Test Sonucu</h2>

      <p>✅ Doğru: <strong>${correct}</strong></p>
      <p>❌ Yanlış: <strong>${wrong}</strong></p>
      <p>⚪ Boş: <strong>${empty}</strong></p>

      <hr>

      <p>Başarı Oranı: <strong>%${successRate}</strong></p>
<p>Tebrikler bu testi çözerek XP kazandınız! Seviyenizi hesabınızda görebilirsiniz.</p>
      <button 
        onclick="window.location.href='katagoriler.html'"
        style="
          margin-top:15px;
          padding:12px 25px;
          border:none;
          border-radius:12px;
          background:#2a5298;
          color:white;
          font-size:16px;
          cursor:pointer;
        ">
        Bitir
      </button>
    </div>
  `;
        function saveTestResult(testKey, correct, wrong, empty, success) {
              let user = JSON.parse(localStorage.getItem("user"));

              if (!user) {
                user = {
                  nickname: "Misafir",
                  xp:0,
      level:1,
      solved:0,
      tests:{}
                };
              }

              const percent = Math.round((correct / 10) * 100);
              let scorePercent = Math.round((correct / total) * 100);

              user.xp += scorePercent;
  if(!user.tests) user.tests = {};

  user.solved++;

  user.xp += successRate;
              localStorage.setItem("user", JSON.stringify(user));

              user.tests[testKey] = {
                correct,
                wrong,
                empty,
                percent: successRate
              };

              localStorage.setItem("user", JSON.stringify(user));
            }
            saveTestResult("trafikadabi-test-6", correct, wrong, empty, successRate);
          }

      function finishTest(result) {
        const user = JSON.parse(localStorage.getItem("user")) || {};
        user.tests = user.tests || {};
        user.inProgress = user.inProgress || {};

        user.tests["trafikadabi-test-6"] = result; // yeni sonuç
        delete user.inProgress["trafikadabi-test-6"]; // yarım kalma durumu silinir

        localStorage.setItem("user", JSON.stringify(user));
      }

      document.getElementById("nextBtn").onclick = nextQuestion;
      document.getElementById("prevBtn").onclick = prevQuestion;

      function updateStats() {

  let correct = 0;
  let wrong = 0;
  let empty = 0;

  userAnswers.forEach((answer, i) => {

    if (answer === null) {
      empty++;
    } 
    else if (answer === questions[i].correct) {
      correct++;
    } 
    else {
      wrong++;
    }

  });

  document.getElementById("statCorrect").textContent = "✅ " + correct;
  document.getElementById("statWrong").textContent = "❌ " + wrong;
  document.getElementById("statEmpty").textContent = "⚪ " + empty;
}

function confirmExit() {
  document.getElementById("exitModal").style.display = "flex";
}

function closeExit() {
  document.getElementById("exitModal").style.display = "none";
}

function exitTest() {
  window.location.href = "katagoriler.html";
}



          loadQuestion();
    </script>
  </body>
</html>
