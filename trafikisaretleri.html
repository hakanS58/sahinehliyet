<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafik İşaretleri</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-user-select:none;
user-select:none;
}

body{
background:#f8fafc;
color:#111827;
}

/* HEADER ESKİ HALİ */

.app-header{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:linear-gradient(
135deg,
#050505,
#111,
#1c1c1c,
#facc15 220%
);
border-radius:0 0 24px 24px;
box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.app-title{
font-size:22px;
font-weight:800;
color:#fff;
}

.app-title::first-letter{
color:#facc15;
}

.back-btn{
width:46px;
height:46px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.08);
color:#facc15;
font-size:18px;
cursor:pointer;
}

.back-btn:hover{
background:#facc15;
color:#000;
}

/* CONTAINER */

.container{
padding:25px;
}

.title{
font-size:30px;
font-weight:800;
margin-bottom:10px;
}

.desc{
color:#64748b;
margin-bottom:24px;
}

/* GRID */

.grid{
display:grid;
gap:18px;
}

/* CARD */

.download-card{
background:white;
border-radius:24px;
padding:22px;
box-shadow:0 10px 25px rgba(0,0,0,.07);
transition:.25s;
border:1px solid #eef2f7;
}

.download-card:hover{
transform:translateY(-4px);
box-shadow:0 16px 35px rgba(0,0,0,.09);
}

.icon{
width:72px;
height:72px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
margin-bottom:14px;
}

.red{background:linear-gradient(135deg,#ef4444,#dc2626);}
.blue{background:linear-gradient(135deg,#3b82f6,#2563eb);}
.yellow{background:linear-gradient(135deg,#facc15,#f59e0b);}
.green{background:linear-gradient(135deg,#22c55e,#16a34a);}

.download-card h3{
font-size:20px;
margin-bottom:8px;
}

.download-card p{
color:#64748b;
margin-bottom:16px;
line-height:1.5;
}

.download-btn{
display:inline-block;
padding:12px 18px;
background:#111827;
color:white;
text-decoration:none;
border-radius:14px;
font-weight:700;
transition:.2s;
}

.download-btn:hover{
background:#facc15;
color:#111827;
}

*{
  -webkit-user-select:none !important;
  -moz-user-select:none !important;
  -ms-user-select:none !important;
  user-select:none !important;

  -webkit-touch-callout:none !important;
  -webkit-tap-highlight-color:transparent !important;
}

/* =========================
   DARK MODE
========================= */

body.dark{
  background:#0f172a;
  color:white;
}

/* CONTAINER */

body.dark .container{
  background:#111827;
}

/* KARTLAR */

body.dark .card,
body.dark .tip,
body.dark .download-card,
body.dark .announcement-card{
  background:#1e293b;
  border:1px solid rgba(255,255,255,.05);
  color:white;
  box-shadow:none;
}

/* TEXT */

body.dark p,
body.dark .desc{
  color:#94a3b8;
}

body.dark h1,
body.dark h2,
body.dark h3,
body.dark h4{
  color:white;
}

/* BUTTON */

body.dark .download-btn,
body.dark .premium-btn{
  background:#facc15;
  color:#111827;
}

/* HEADER */

body.dark .app-header{
  background:linear-gradient(
    135deg,
    #050505,
    #111,
    #1c1c1c,
    #facc15 220%
  );
}
a{
-webkit-touch-callout:none;
}

/* ŞAHİN HEADER */

.seh-header-wrap{

    position:sticky;
    top:0;
    z-index:99999;

    width:100%;
    height:78px;

    display:flex;
    align-items:flex-start;

    padding:12px 18px;

    background:linear-gradient(
        135deg,
        #050505 0%,
        #101010 45%,
        #1a1a1a 75%,
        #f4b400 220%
    );

    border-bottom-left-radius:26px;
    border-bottom-right-radius:26px;

    border-bottom:2px solid rgba(255,200,0,.22);

    box-shadow:
        0 8px 25px rgba(0,0,0,.30),
        inset 0 -1px rgba(255,215,0,.10);

    overflow:hidden;
}

.seh-header-wrap::before{

    content:'';

    position:absolute;
    inset:0;

    background:radial-gradient(
        circle at top right,
        rgba(255,200,0,.15),
        transparent 40%
    );

    pointer-events:none;
}

/* GERİ BUTONU */

.seh-back-button{

    width:50px;
    height:50px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.05);

    color:#facc15;

    font-size:19px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    position:relative;
    z-index:2;

    outline:none;

    -webkit-tap-highlight-color:transparent;

    box-shadow:
        inset 0 1px rgba(255,255,255,.05),
        0 4px 12px rgba(0,0,0,.18);
}

.seh-back-button:active{
    transform:scale(.96);
}
</style>
</head>

<body>

<div class="seh-header-wrap">

    <button class="seh-back-button" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

</div>

<div class="container">

<div class="title">Trafik İşaretleri</div>
<div class="desc">
İndirip galeriden yakınlaştırarak detaylı inceleyebilirsin.
</div>

<div class="grid">

<!-- UYARI -->
<div class="download-card">
<div class="icon red">
<i class="fa-solid fa-triangle-exclamation"></i>
</div>
<h3>Uyarı İşaretleri</h3>
<p>Tüm uyarı levhalarını indir.</p>
<a href="Trafik Uyarı İşaretleri.png" download class="download-btn" draggable="false">İndir</a>
</div>

<!-- TANZİM -->
<div class="download-card">
<div class="icon blue">
<i class="fa-solid fa-road"></i>
</div>
<h3>Trafik Tanzim</h3>
<p>Düzenleyici trafik levhaları.</p>
<a href="Trafik Tanzim İşaretleri  Şahin Ehliyet.png" download class="download-btn" draggable="false">İndir</a>
</div>

<!-- BİLGİ -->
<div class="download-card">
<div class="icon yellow">
<i class="fa-solid fa-circle-info"></i>
</div>
<h3>Bilgi İşaretleri</h3>
<p>Bilgilendirici levhalar.</p>
<a href="Trafik Bilgi İşaretleri  Şahin Ehliyet.png" download class="download-btn" draggable="false">İndir</a>
</div>

<!-- YOL -->
<div class="download-card">
<div class="icon green">
<i class="fa-solid fa-route"></i>
</div>
<h3>Yol İşaretleri</h3>
<p>Yol çizgileri ve yön işaretleri.</p>
<a href="Trafik Yol İşaretleri  Şahin Ehliyet.png" download class="download-btn" draggable="false">İndir</a>
</div>

</div>
</div>
  <script>
/* SAĞ TIK KAPAT */
document.addEventListener("contextmenu", e => e.preventDefault());

/* UZUN BASMA MENÜSÜ KAPAT */
document.addEventListener("selectstart", e => e.preventDefault());

/* KOPYALA / KES / YAPIŞTIR KISAYOLLARI KAPAT */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* MOBİL UZUN BASMA */
document.addEventListener("touchstart", function(){}, {passive:true});


(function () {

  if(localStorage.getItem("theme") === "true"){
    document.body.classList.add("dark");
  }

})();
  </script>
</body>
</html>
