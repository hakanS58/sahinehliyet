<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trafik Uyarı İşaretleri</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}

/* Header */

.header{
    height:70px;
    display:flex;
    align-items:center;
    padding:0 15px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    box-shadow:0 4px 15px rgba(0,0,0,.4);
}

.header button{
    background:rgba(255,255,255,.2);
    border:none;
    width:38px;
    height:38px;
    border-radius:10px;
    color:#fff;
    font-size:16px;
}

.header h1{
    flex:1;
    text-align:center;
    margin:0;
    font-size:18px;
}

/* Kart */

.image-card{
    margin:20px;
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:15px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 25px rgba(0,0,0,.5);
}

/* Resim Alanı */

.image-box{
    overflow:auto;
    -webkit-overflow-scrolling: touch;
}


/* Resim */

.image-box img{
    width:100%;
    height:auto;
    max-width:100%;
    display:block;
}


/* Bilgi */

.info{
    margin-top:12px;
    font-size:13px;
    opacity:.9;
    text-align:center;
}

/* Zoom Efekti */

.image-box img{
    transition:.3s;
}

.image-box img:active{
    transform:scale(1.4);
}
.app-header{
    position: sticky;
    z-index: 999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 18px 16px;

    background:linear-gradient(
        135deg,
        #050505 0%,
        #101010 40%,
        #1a1a1a 70%,
        #f4b400 180%
    );

    border-bottom-left-radius:24px;
    border-bottom-right-radius:24px;

    border-bottom:2px solid rgba(255,200,0,.35);

    box-shadow:
        0 8px 25px rgba(0,0,0,.35),
        inset 0 -1px rgba(255,215,0,.18);

    backdrop-filter: blur(18px);
}

.app-header::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(
        circle at top right,
        rgba(255,200,0,.18),
        transparent 35%
    );
    pointer-events:none;
}

.app-title{
    font-size:24px;
    font-weight:900;
    color:#fff;
    letter-spacing:.5px;
    text-shadow:0 0 16px rgba(255,200,0,.25);
}

.app-title::first-letter{
    color:#f4b400;
}

.back-btn{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);

    color:#f4b400;
    font-size:20px;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:.25s ease;

    box-shadow:
        inset 0 1px rgba(255,255,255,.12),
        0 4px 14px rgba(0,0,0,.25);
}

.back-btn:hover{
    transform:translateY(-2px) scale(1.05);
    background:#f4b400;
    color:#000;
    box-shadow:0 8px 20px rgba(255,200,0,.35);
}

/* TÜM KOPYALAMA / SEÇMEYİ KAPAT */

*{
  -webkit-user-select:none !important;
  -moz-user-select:none !important;
  -ms-user-select:none !important;
  user-select:none !important;

  -webkit-touch-callout:none !important;
  -webkit-tap-highlight-color:transparent !important;
}
</style>
</head>

<body>

<!-- Header -->
<header class="app-header">
    <div class="header-left">
        <span class="app-title">Şahin Ehliyetim</span>
    </div>

    <div class="header-right">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
    </div>
</header>

<!-- Kart -->
<div class="image-card">
  <div class="info">
    🔍 Yakınlaştırmak için resme dokun veya kaydır
  </div>
  <div class="image-box">

    <!-- BURAYA RESMİNİ KOY -->
    <img src="Trafik Uyarı İşaretleri.png" alt="Trafik Uyarı İşaretleri">

  </div>
</div>


<!-- Kart -->
<div class="image-card">
  <div class="info">
    🔍 Yakınlaştırmak için resme dokun veya kaydır
  </div>
  <div class="image-box">

    <!-- BURAYA RESMİNİ KOY -->
    <img src="Trafik Tanzim İşaretleri  Şahin Ehliyet.png" alt="Trafik Uyarı İşaretleri">

  </div>
</div>

<!-- Kart -->
<div class="image-card">
  <div class="info">
    🔍 Yakınlaştırmak için resme dokun veya kaydır
  </div>
  <div class="image-box">

    <!-- BURAYA RESMİNİ KOY -->
    <img src="Trafik Bilgi İşaretleri  Şahin Ehliyet.png" alt="Trafik Uyarı İşaretleri">

  </div>
</div>

<!-- Kart -->
<div class="image-card">
  <div class="info">
    🔍 Yakınlaştırmak için resme dokun veya kaydır
  </div>
  <div class="image-box">

    <!-- BURAYA RESMİNİ KOY -->
    <img src="Trafik Yol İşaretleri  Şahin Ehliyet.png" alt="Trafik Uyarı İşaretleri">

  </div>
</div>


    <script>
/* SAĞ TIK KAPAT */
document.addEventListener("contextmenu", e => e.preventDefault());

/* UZUN BASMA MENÜSÜ KAPAT */
document.addEventListener("selectstart", e => e.preventDefault());

/* KOPYALA / KES / YAPIŞTIR KISAYOLLARI KAPAT */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* MOBİL UZUN BASMA */
document.addEventListener("touchstart", function(){}, {passive:true});
</script>
</body>
</html>
